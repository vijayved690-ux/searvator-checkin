<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Self Check-In</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-extrabold text-blue-900">Usmanpura Imaging Centre</h2>
            <p class="text-xs text-gray-500 font-semibold tracking-wider mt-1">SEARVATOR IT SOLUTIONS PVT. LTD. | WE BUY AND SELL | RUNNING MRI CENTRES</p>
        </div>

        <form id="checkinForm" class="space-y-4">
            <input type="text" id="name" placeholder="Full Name" required class="w-full px-4 py-3 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
            
            <div class="flex space-x-4">
                <input type="number" id="age" placeholder="Age" required class="w-1/2 px-4 py-3 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <select id="gender" class="w-1/2 px-4 py-3 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <input type="tel" id="contact" placeholder="Mobile Number" required class="w-full px-4 py-3 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
            
            <select id="visit_type" class="w-full px-4 py-3 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="New">New Patient</option>
                <option value="Repeat">Repeat Patient</option>
            </select>

            <textarea id="purpose" rows="2" placeholder="Purpose of visit (e.g. Doctor prescribed Cardiac MRI)" class="w-full px-4 py-3 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700 transition duration-300">Submit Details</button>
        </form>

        <div id="successMsg" class="hidden mt-4 bg-green-100 border-l-4 border-green-500 text-green-700 p-4">
            <p class="font-bold">Check-in Successful!</p>
            <p class="text-sm">Please wait in the reception area.</p>
        </div>
    </div>

    <script>
        document.getElementById('checkinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                name: document.getElementById('name').value,
                age: document.getElementById('age').value,
                gender: document.getElementById('gender').value,
                contact: document.getElementById('contact').value,
                visit_type: document.getElementById('visit_type').value,
                purpose: document.getElementById('purpose').value,
                campaign: "qr_desk_1" // For tracking
            };

            const response = await fetch('/api/submit_checkin', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                document.getElementById('checkinForm').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
                // Form reset after 5 seconds for next patient
                setTimeout(() => location.reload(), 5000); 
            }
        });
    </script>
</body>
</html>
